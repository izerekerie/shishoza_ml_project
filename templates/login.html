<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Shishoza — Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = { darkMode:"class", theme:{ extend:{
    "colors": {
      "on-primary":"#ffffff","primary":"#002113","primary-container":"#073824","secondary":"#3a6750",
      "on-secondary-container":"#406d55","secondary-container":"#bceecf","surface-container-low":"#f2f4f3",
      "on-surface":"#191c1c","on-surface-variant":"#414943","outline-variant":"#c1c9c1","background":"#f8faf9",
      "error":"#dc2626","error-container":"#ffdad6","on-error-container":"#93000a"
    },
    "borderRadius": { "DEFAULT":"0.5rem","lg":"1rem","full":"9999px" },
    "spacing": { "gutter":"16px","base":"8px","container-margin":"24px","section-gap":"64px" },
    "fontFamily": { "headline-lg":["Inter"],"title-md":["Inter"],"label-caps":["Inter"],"body-lg":["Inter"],"body-sm":["Inter"] },
    "fontSize": {
      "headline-lg":["32px",{"lineHeight":"40px","fontWeight":"800"}],
      "title-md":["20px",{"lineHeight":"28px","fontWeight":"600"}],
      "label-caps":["12px",{"lineHeight":"16px","letterSpacing":"0.08em","fontWeight":"600"}],
      "body-lg":["16px",{"lineHeight":"24px"}],"body-sm":["14px",{"lineHeight":"20px"}]
    }
  } } }
</script>
<style>
  body { font-family:'Inter',sans-serif; background:#f8faf9; }
  .glass-card { background:rgba(255,255,255,0.9); backdrop-filter:blur(12px);
                border:1px solid rgba(0,0,0,0.05); box-shadow:0 20px 40px rgba(0,0,0,0.06); }
  .input-focus-ring:focus { outline:none; box-shadow:0 0 0 2px #14532d; border-color:#14532d; }
</style>
</head>
<body class="flex flex-col min-h-screen bg-background text-on-surface">
<main class="flex-grow flex items-center justify-center px-gutter py-section-gap">
  <div class="w-full max-w-[380px]">
    <div class="text-center mb-base">
      <a href="/" class="font-headline-lg text-headline-lg font-black tracking-tighter text-primary">Shishoza</a>
    </div>
    <div class="glass-card rounded-lg p-container-margin">
      <h1 class="font-title-md text-title-md text-on-surface mb-6 text-center">Forest Manager Sign-in</h1>
      <form id="loginForm" class="space-y-4">
        <div class="space-y-1">
          <label class="font-label-caps text-label-caps uppercase text-on-surface-variant" for="email">Email Address</label>
          <div class="relative">
            <input class="w-full h-12 px-10 rounded bg-surface-container-low border border-outline-variant text-body-lg input-focus-ring transition-all" id="email" name="email" placeholder="manager@treesight.rw" required autocomplete="username" type="email">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/70">mail</span>
          </div>
        </div>
        <div class="space-y-1">
          <label class="font-label-caps text-label-caps uppercase text-on-surface-variant" for="password">Password</label>
          <div class="relative">
            <input class="w-full h-12 px-10 rounded bg-surface-container-low border border-outline-variant text-body-lg input-focus-ring transition-all" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" type="password">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/70">lock</span>
          </div>
        </div>
        <button id="loginBtn" class="w-full text-on-primary font-bold h-12 rounded-full hover:opacity-90 active:scale-95 transition-all mt-4 flex items-center justify-center gap-2" style="background-color:#14532d" type="submit">
          Sign In <span class="material-symbols-outlined">arrow_forward</span>
        </button>
        <div id="err" class="hidden text-sm text-error bg-error-container/40 border border-error/30 rounded px-3 py-2"></div>
      </form>
      <div class="mt-4 text-center">
        <a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors inline-flex items-center justify-center gap-1" href="/">
          <span class="material-symbols-outlined text-[18px]">west</span> Back to landing
        </a>
      </div>
    </div>
    <!-- Real demo accounts -->
    <div class="mt-4 p-4 bg-secondary-container/30 border border-dashed border-secondary/30 rounded-lg">
      <div class="flex items-center gap-2 mb-2">
        <span class="material-symbols-outlined text-[20px] text-secondary">info</span>
        <span class="font-label-caps text-label-caps uppercase text-secondary">System access roles</span>
      </div>
      <div class="font-mono text-[12px] leading-relaxed text-on-secondary-container space-y-1">
        <div class="flex justify-between border-b border-secondary/20 pb-1"><span>admin@treesight.rw</span><span class="font-bold">admin</span></div>
        <div class="flex justify-between border-b border-secondary/20 pb-1"><span>manager.nyamasheke@treesight.rw</span><span class="font-bold">nyamasheke</span></div>
        <div class="flex justify-between pt-1"><span>manager.rusizi@treesight.rw</span><span class="font-bold">rusizi</span></div>
      </div>
    </div>
  </div>
</main>
<footer class="w-full py-base text-center">
  <p class="font-body-sm text-body-sm text-on-surface-variant/60">© 2026 Shishoza Forest Management System · ALU BSc Software Engineering</p>
</footer>
<script>
const form = document.getElementById('loginForm');
const btn = document.getElementById('loginBtn');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const err = document.getElementById('err');
  err.classList.add('hidden');
  btn.disabled = true;
  const original = btn.innerHTML;
  btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Authenticating…';
  try {
    const r = await fetch('/api/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password })
    });
    const data = await r.json();
    if (data.ok) { window.location.href = '/manager'; return; }
    err.textContent = data.error || 'Login failed';
    err.classList.remove('hidden');
  } catch (e) {
    err.textContent = 'Network error';
    err.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.innerHTML = original;
  }
});
</script>
</body></html>
